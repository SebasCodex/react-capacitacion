<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Carta React</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .card {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            width: 220px;
        }

        .disponible {
            background: #d4edda;
        }

        .agotado {
            background: #f8d7da;
        }
    </style>

</head>

<body>

    <h1>Carta con React</h1>

    <div id="root"></div>

    <script type="text/babel">

        const platos = [

            { id: 1, nombre: "Lomo saltado", categoria: "segundos", precio: 18, stock: 3, disponible: true },

            { id: 2, nombre: "Arroz con pollo", categoria: "segundos", precio: 12, stock: 5, disponible: true },

            { id: 3, nombre: "Sopa de verduras", categoria: "entradas", precio: 8, stock: 0, disponible: false },

            { id: 4, nombre: "Pollo a la brasa", categoria: "segundos", precio: 20, stock: 4, disponible: true },

            { id: 5, nombre: "Jugo de naranja", categoria: "bebidas", precio: 5, stock: 8, disponible: true }

        ]

        function Carta({ platos }) {

            return (

                <div>

                    {platos.map(plato => (

                        <div
                            key={plato.id}
                            className={`card ${plato.disponible ? "disponible" : "agotado"}`}
                        >

                            <h3>{plato.nombre}</h3>

                            <p>Categoría: {plato.categoria}</p>

                            <p>Precio: S/{plato.precio}</p>

                            <p>Stock: {plato.stock}</p>

                            <p>{plato.disponible ? "Disponible" : "Agotado"}</p>

                        </div>

                    ))}

                </div>

            )

        }

        const root = ReactDOM.createRoot(document.getElementById("root"))

        root.render(<Carta platos={platos} />)

    </script>

</body>

</html>
